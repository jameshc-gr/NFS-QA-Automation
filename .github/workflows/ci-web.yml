name: CI Web Tests

on:
  pull_request:
    branches: [ main, master ]

jobs:
  test-web:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run web tests (chromium)
        env:
          TEST_PROJECT: student-loan-refi
        run: npx playwright test tests/projects/student-loan-refi --project=chromium

      - name: Upload playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-web-results
          path: |
            test-results/
            playwright-report/
          if-no-files-found: warn
