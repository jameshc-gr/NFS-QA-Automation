name: Appium MCP CI (manual)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'platform to test (android|ios)'
        required: true
        default: 'android'

jobs:
  run-appium-tests:
    runs-on: ubuntu-latest
    env:
      NO_UI: 'true'
      CAPABILITIES_CONFIG: './Jira/student-refi/capabilities.json'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          npm ci

      - name: Start Appium MCP (background)
        run: |
          # Start appium-mcp in NO_UI mode for CI. It runs in foreground; run in background.
          npx -y appium-mcp@latest &
          sleep 3

      - name: Run Playwright tests
        env:
          # Placeholders — set via repository secrets or workflow inputs as needed.
          AI_VISION_ENABLED: ${{ secrets.AI_VISION_ENABLED }}
          AI_VISION_API_BASE_URL: ${{ secrets.AI_VISION_API_BASE_URL }}
          AI_VISION_API_KEY: ${{ secrets.AI_VISION_API_KEY }}
        run: |
          npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Stop Appium MCP
        if: ${{ always() }}
        run: |
          # Best-effort kill any appium-mcp node process
          pkill -f appium-mcp || true

# Notes:
# - This workflow is a scaffold. Adjust CAPABILITIES_CONFIG, device management,
#   and environment variables to match your CI/device-farm setup.
# - For iOS testing on macOS runners, change `runs-on` to `macos-latest` and
#   ensure Xcode tools are installed and signed correctly.
